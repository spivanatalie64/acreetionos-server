# /etc/pacman.conf
# AcreetionOS Server — Custom repository configuration
# Uses acreetionos-main, personal, and acur repos exclusively.
# Standard Arch Linux repositories are NOT used — we maintain our own.
#
# #KeepLinuxFree #AcreetionOSWillAlwaysBeFree

[options]
IgnorePkg = v4l2loopback-dkms
NoUpgrade = pacman
OverwriteFiles = *
Architecture = auto
Overwrite    = *
Color
CheckSpace
ParallelDownloads = 25
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

# ── AcreetionOS Server Repositories ────────────────────────────────────
# These are the ONLY repos used. No Arch main/testing/community repos.
# acreetionos-main   → LTS-stable curated packages
# personal           → Additional tools & utilities
# acur              → AcreetionOS Community User Repository (AUR-compatible)

[acreetionos-main]
SigLevel = Optional
Server = https://iso.acreetionos.org:8448/repo-main/$arch

[personal]
SigLevel = Optional
Server = https://iso.acreetionos.org:8448/personal

[acur]
SigLevel = Optional
Server = https://iso.acreetionos.org:8448/acur
